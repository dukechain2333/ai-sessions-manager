name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Cross-compile (macOS + Linux, amd64 + arm64)
        run: |
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 \
              go build -o /dev/null ./cmd/sm
          done
